<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cape Town House Search</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d2e;
    --surface2: #252840;
    --border: #2e3250;
    --text: #e2e4f0;
    --muted: #7b7f9e;
    --accent: #6c8aff;
    --accent2: #a78bfa;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --tag-bg: #1e2235;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  header h1 { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
  header h1 span { color: var(--accent); }
  .header-meta { font-size: 12px; color: var(--muted); }

  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }
  .controls label { font-size: 12px; color: var(--muted); margin-right: 4px; }
  select, input[type=range], input[type=text] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }
  select:focus, input[type=text]:focus { border-color: var(--accent); }
  .filter-group { display: flex; align-items: center; gap: 6px; }
  .toggle-sold {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    font-size: 12px;
    color: var(--muted);
    margin-left: auto;
  }
  .toggle-sold input { cursor: pointer; accent-color: var(--accent); }
  .count-badge {
    background: var(--accent);
    color: #fff;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    margin-left: 8px;
  }

  main { padding: 20px 24px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.15s, box-shadow 0.15s;
    display: flex;
    flex-direction: column;
  }
  .card:hover { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent)20; }
  .card.sold { opacity: 0.55; }

  .card-header {
    padding: 14px 16px 10px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .card-area { font-size: 13px; font-weight: 700; color: var(--text); }
  .card-address { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .card-price {
    font-size: 16px;
    font-weight: 800;
    color: var(--accent);
    white-space: nowrap;
  }

  .card-badges {
    padding: 0 16px 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--tag-bg);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .badge.yes { color: var(--green); border-color: var(--green)40; background: var(--green)10; }
  .badge.no { color: var(--red); border-color: var(--red)20; }
  .badge.unknown { color: var(--muted); }
  .badge.status-new { color: var(--green); border-color: var(--green)40; background: var(--green)10; }
  .badge.status-under_offer { color: var(--amber); border-color: var(--amber)40; background: var(--amber)10; }
  .badge.status-sold { color: var(--red); border-color: var(--red)40; background: var(--red)10; }

  .card-notes {
    padding: 0 16px 10px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    flex: 1;
  }

  .card-score {
    padding: 4px 16px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .score-label { font-size: 11px; color: var(--muted); }
  .score-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .score-num { font-size: 11px; font-weight: 700; color: var(--accent2); min-width: 18px; text-align: right; }

  .card-actions {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .status-select {
    flex: 1;
    font-size: 12px;
    padding: 5px 8px;
  }
  .view-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    text-decoration: none;
    padding: 5px 10px;
    border: 1px solid var(--accent)40;
    border-radius: 6px;
    background: var(--accent)10;
    white-space: nowrap;
    transition: background 0.1s;
  }
  .view-btn:hover { background: var(--accent)20; }

  .notes-area {
    padding: 0 16px 12px;
    display: none;
  }
  .notes-area.open { display: block; }
  .notes-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 12px;
    resize: vertical;
    min-height: 54px;
    font-family: inherit;
    outline: none;
  }
  .notes-input:focus { border-color: var(--accent); }
  .notes-row { display: flex; gap: 6px; margin-top: 6px; }
  .save-btn {
    font-size: 12px;
    font-weight: 600;
    padding: 5px 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: opacity 0.1s;
  }
  .save-btn:hover { opacity: 0.85; }
  .notes-toggle {
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    padding: 5px 8px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    transition: color 0.1s;
  }
  .notes-toggle:hover { color: var(--text); }

  .agent-block {
    padding: 0 16px 10px;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
  }
  .agent-block strong { color: var(--text); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 14px;
  }

  .stats-bar {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    padding: 12px 24px;
    background: var(--surface)80;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
  }
  .stat { display: flex; align-items: center; gap: 5px; }
  .stat-dot { width: 7px; height: 7px; border-radius: 50%; }
  .stat-dot.green { background: var(--green); }
  .stat-dot.amber { background: var(--amber); }
  .stat-dot.red { background: var(--red); }
</style>
</head>

<div id="auth-overlay" style="position:fixed;inset:0;background:#0f1117;display:flex;align-items:center;justify-content:center;z-index:9999;">
  <div style="background:#1a1d2e;border:1px solid #2e3250;border-radius:12px;padding:36px 40px;text-align:center;min-width:300px;">
    <div style="font-size:24px;margin-bottom:8px;">🏡</div>
    <h2 style="font-size:16px;font-weight:700;color:#e2e4f0;margin-bottom:6px;">Cape Town House Search</h2>
    <p style="font-size:13px;color:#7b7f9e;margin-bottom:24px;">Enter password to continue</p>
    <input id="auth-input" type="password" placeholder="Password"
      style="width:100%;padding:10px 14px;background:#252840;border:1px solid #2e3250;border-radius:8px;color:#e2e4f0;font-size:14px;outline:none;margin-bottom:12px;"
      onkeydown="if(event.key==='Enter')checkAuth()">
    <button onclick="checkAuth()"
      style="width:100%;padding:10px;background:#6c8aff;border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;">
      Enter
    </button>
    <p id="auth-error" style="color:#ef4444;font-size:12px;margin-top:10px;display:none;">Incorrect password</p>
  </div>
</div>
<script>
  (function(){
    if(sessionStorage.getItem('ct_auth')==='1'){document.getElementById('auth-overlay').style.display='none';}
  })();
  function checkAuth(){
    if(document.getElementById('auth-input').value==='JanoydCT'){
      sessionStorage.setItem('ct_auth','1');
      document.getElementById('auth-overlay').style.display='none';
    } else {
      document.getElementById('auth-error').style.display='block';
      document.getElementById('auth-input').value='';
      document.getElementById('auth-input').focus();
    }
  }
</script>

// ── PARSE CSV ─────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',');
  return lines.slice(1).map(line => {
    // handle commas in quoted fields
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; continue; }
      if (line[i] === ',' && !inQ) { cols.push(cur); cur = ''; continue; }
      cur += line[i];
    }
    cols.push(cur);
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = (cols[i] || '').trim());
    return obj;
  });
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let listings = parseCSV(CSV_DATA);

// Load overrides from localStorage
const saved = JSON.parse(localStorage.getItem('houseSearchOverrides') || '{}');
listings = listings.map(l => ({ ...l, ...(saved[l.id] || {}) }));

function saveOverrides() {
  const overrides = {};
  listings.forEach(l => {
    overrides[l.id] = { status: l.status, notes: l.notes, listing_status: l.listing_status };
  });
  localStorage.setItem('houseSearchOverrides', JSON.stringify(overrides));
}

// ── FORMAT ────────────────────────────────────────────────────────────────────
function formatPrice(p) {
  const n = parseInt(p);
  if (!n) return 'POA';
  return 'R ' + (n / 1e6).toFixed(2).replace(/\.?0+$/, '') + 'M';
}

function statusLabel(s) {
  const m = { new: 'Active', under_offer: 'Under Offer', sold: 'Sold', unknown: 'Unknown' };
  return m[s] || s;
}

function yesNo(v) {
  if (v === 'yes') return '<span class="badge yes">✓ Yes</span>';
  if (v === 'no') return '<span class="badge no">✗ No</span>';
  return '<span class="badge unknown">?</span>';
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const grid = document.getElementById('listings-grid');
  const empty = document.getElementById('empty-state');

  const filterArea = document.getElementById('filter-area').value;
  const filterStatus = document.getElementById('filter-status').value;
  const filterPrice = document.getElementById('filter-price').value;
  const filterGarage = document.getElementById('filter-garage').value;
  const filterFlatlet = document.getElementById('filter-flatlet').value;
  const showSold = document.getElementById('show-sold').checked;

  let visible = listings.filter(l => {
    if (!showSold && l.listing_status === 'sold') return false;
    if (filterArea && l.area !== filterArea) return false;
    if (filterStatus && l.status !== filterStatus) return false;
    if (filterPrice && parseInt(l.price) > parseInt(filterPrice)) return false;
    if (filterGarage && l.garage !== filterGarage) return false;
    if (filterFlatlet && l.flatlet !== filterFlatlet) return false;
    return true;
  });

  // sort by score desc, then listing_status (new first)
  visible.sort((a, b) => {
    const statusOrder = { new: 0, under_offer: 1, unknown: 2, sold: 3 };
    const scoreDiff = parseInt(b.score || 0) - parseInt(a.score || 0);
    if (scoreDiff !== 0) return scoreDiff;
    return (statusOrder[a.listing_status] || 2) - (statusOrder[b.listing_status] || 2);
  });

  if (visible.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    grid.innerHTML = visible.map(l => cardHTML(l)).join('');
  }

  updateStats();
  updateAreaFilter();
  updateMeta();
}

function cardHTML(l) {
  const statusClass = { new: 'status-new', under_offer: 'status-under_offer', sold: 'status-sold' }[l.listing_status] || '';
  const statusText = statusLabel(l.listing_status);
  const scoreWidth = (parseInt(l.score || 0) / 10 * 100) + '%';
  const addr = (l.address && l.address !== 'unknown') ? l.address : '';
  const agentInfo = l.agent_name && l.agent_name !== 'unknown'
    ? `<div class="agent-block"><strong>${l.agent_name}</strong>${l.agent_phone ? ' · ' + l.agent_phone : ''}${l.agent_email ? ' · <a href="mailto:'+l.agent_email+'" style="color:var(--accent)">' + l.agent_email + '</a>' : ''}</div>`
    : '';

  const userStatusOptions = ['unseen','seen','interested','rejected']
    .map(s => `<option value="${s}" ${l.status === s ? 'selected' : ''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`)
    .join('');

  const listingStatusOptions = [['new','Active'],['under_offer','Under Offer'],['sold','Sold'],['unknown','Unknown']]
    .map(([v, label]) => `<option value="${v}" ${l.listing_status === v ? 'selected' : ''}>${label}</option>`)
    .join('');

  const notesVal = (l.notes || '').replace(/"/g, '&quot;');
  const notesDisplay = l.status === 'interested' || l.status === 'rejected'
    ? `<div class="card-notes" style="color:${l.status==='interested'?'#86efac':'#fca5a5'}">${l.notes || ''}</div>`
    : (l.notes ? `<div class="card-notes">${l.notes}</div>` : '');

  return `
  <div class="card ${l.listing_status === 'sold' ? 'sold' : ''}" id="card-${l.id}">
    <div class="card-header">
      <div>
        <div class="card-area">${l.area}</div>
        ${addr ? `<div class="card-address">${addr}</div>` : ''}
      </div>
      <div class="card-price">${formatPrice(l.price)}</div>
    </div>
    <div class="card-badges">
      <span class="badge ${statusClass}">${statusText}</span>
      <span class="badge">${l.bedrooms} bed</span>
      ${l.bathrooms !== 'unknown' ? `<span class="badge">${l.bathrooms} bath</span>` : ''}
      <span class="badge">Garage: ${l.garage === 'yes' ? '✓' : l.garage === 'no' ? '✗' : '?'}</span>
      <span class="badge">Flatlet: ${l.flatlet === 'yes' ? '✓' : l.flatlet === 'no' ? '✗' : '?'}</span>
      <span class="badge yes">Garden ✓</span>
    </div>
    ${notesDisplay}
    ${agentInfo}
    <div class="card-score">
      <span class="score-label">Score</span>
      <div class="score-bar"><div class="score-fill" style="width:${scoreWidth}"></div></div>
      <span class="score-num">${l.score || '—'}</span>
    </div>
    <div class="notes-area" id="notes-area-${l.id}">
      <textarea class="notes-input" id="notes-input-${l.id}" placeholder="Add notes…">${notesVal}</textarea>
      <div class="notes-row">
        <button class="save-btn" onclick="saveNotes('${l.id}')">Save</button>
        <button class="notes-toggle" onclick="toggleNotes('${l.id}')">Cancel</button>
      </div>
    </div>
    <div class="card-actions">
      <select class="status-select" title="My status" onchange="updateStatus('${l.id}', this.value)">
        ${userStatusOptions}
      </select>
      <select class="status-select listing-status-select" title="Listing status (override)" onchange="updateListingStatus('${l.id}', this.value)" style="flex:0;min-width:110px;border-color:${l.listing_status==='sold'?'var(--red)40':l.listing_status==='under_offer'?'var(--amber)40':'var(--green)40'}">
        ${listingStatusOptions}
      </select>
      <button class="notes-toggle" onclick="toggleNotes('${l.id}')">📝</button>
      <a class="view-btn" href="${l.url}" target="_blank">View →</a>
    </div>
  </div>`;
}

// ── INTERACTIONS ──────────────────────────────────────────────────────────────
function updateStatus(id, val) {
  const l = listings.find(x => x.id === id);
  if (l) { l.status = val; saveOverrides(); render(); }
}

function updateListingStatus(id, val) {
  const l = listings.find(x => x.id === id);
  if (l) { l.listing_status = val; saveOverrides(); render(); }
}

function toggleNotes(id) {
  const area = document.getElementById('notes-area-' + id);
  if (area) area.classList.toggle('open');
}

function saveNotes(id) {
  const inp = document.getElementById('notes-input-' + id);
  const l = listings.find(x => x.id === id);
  if (l && inp) {
    l.notes = inp.value;
    saveOverrides();
    toggleNotes(id);
    render();
  }
}

function updateAreaFilter() {
  const sel = document.getElementById('filter-area');
  const current = sel.value;
  const areas = [...new Set(listings.map(l => l.area))].sort();
  sel.innerHTML = '<option value="">All areas</option>' +
    areas.map(a => `<option value="${a}" ${a === current ? 'selected' : ''}>${a}</option>`).join('');
}

function updateStats() {
  const bar = document.getElementById('stats-bar');
  const counts = { new: 0, under_offer: 0, sold: 0 };
  listings.forEach(l => { counts[l.listing_status] = (counts[l.listing_status] || 0) + 1; });
  bar.innerHTML = `
    <div class="stat"><div class="stat-dot green"></div> ${counts.new || 0} active</div>
    <div class="stat"><div class="stat-dot amber"></div> ${counts.under_offer || 0} under offer</div>
    <div class="stat"><div class="stat-dot red"></div> ${counts.sold || 0} sold</div>
    <div class="stat">Total: ${listings.length}</div>
  `;
}

function updateMeta() {
  document.getElementById('updated-meta').textContent = 'Last updated: ' + new Date().toLocaleDateString('en-ZA', { day: 'numeric', month: 'short', year: 'numeric' });
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.getElementById('filter-area').addEventListener('change', render);
document.getElementById('filter-status').addEventListener('change', render);
document.getElementById('filter-price').addEventListener('change', render);
document.getElementById('filter-garage').addEventListener('change', render);
document.getElementById('filter-flatlet').addEventListener('change', render);
document.getElementById('show-sold').addEventListener('change', render);

render();
</script>
</body>
</html>
